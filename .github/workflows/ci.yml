name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: CLI help
        run: python -m robot_diag.cli --help
      - name: Smoke test run (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m robot_diag.cli run --all --duration 1 --size-mb 1 --disk-path /tmp --output reports/ci.json
      - name: Smoke test run (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m robot_diag.cli run --all --duration 1 --size-mb 1 --disk-path C:\\Temp --output reports\\ci.json
      - name: Show report
        if: always()
        run: |
          test -f reports/ci.json && cat reports/ci.json || true
